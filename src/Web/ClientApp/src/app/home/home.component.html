<div ngClass="dark Home">

  <div ngClass="LS">
    <div>
      <input type='text' placeholder='Search' ngClass="SI p-2" />
    </div>
    <div>
      <h2 ngClass='mt-2 p-2'>Articles</h2>

      <div ngClass="HomeCard py-4 mx-2" *ngFor="let a of data">

        <div ngClass="HomeCardHeader">

          <a routerLink="/profile/{{a.writerId}}">
            <img *ngIf="a.writerImg != null else Gene" src={{a.writerImg}} />
            <ng-template #Gene>
              <img src="../../../assets/GenericUser.png" alt={{a.writerName}} />
              {{a.writerName}}
            </ng-template>
          </a>



          <div ngClass="mx-2" style="display: inline-block;">
            {{a.date}}
          </div>
        </div>

        <a routerLink="/article/{{a.id}}" ngClass="HomeCardBody mt-3">
          <div>
            <h3>{{a.title}}</h3>
            <p style="word-break: break-word;">{{a.content | slice:0:300}}...</p>
          </div>
          <img src={{a.articleImg}} alt={{a.writerName}} />
        </a>

        <div ngClass="Tools mt-3">
          <button (click)="bookmark()">
            <svg *ngIf="bookmarkIcon else showThis" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" className="bi bi-bookmark-fill" viewBox="0 0 16 16">
              <path d="M2 2v13.5a.5.5 0 0 0 .74.439L8 13.069l5.26 2.87A.5.5 0 0 0 14 15.5V2a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z" />
            </svg>
            <ng-template #showThis>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" className="bi bi-bookmark" viewBox="0 0 16 16">
                <path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v13.5a.5.5 0 0 1-.777.416L8 13.101l-5.223 2.815A.5.5 0 0 1 2 15.5V2zm2-1a1 1 0 0 0-1 1v12.566l4.723-2.482a.5.5 0 0 1 .554 0L13 14.566V2a1 1 0 0 0-1-1H4z" />
              </svg>
            </ng-template>
          </button>
        </div>

      </div>


    </div>
  </div>

  <div ngClass="RS">
    <h5>
      People you might be interested
    </h5>

    <div ngClass="Suggest mt-4">
      <div>
        <img src='https://m.media-amazon.com/images/M/MV5BNTRiMWRlZDItYmUzOS00YmVhLTkwY2EtMjQwMDllOTEzNWE2XkEyXkFqcGdeQXVyNjUxMjc1OTM@._V1_.jpg' alt='' />
        Thomas Friedman
      </div>
      <button ngClass='p-2'>Follow</button>
    </div>

    <div ngClass="Suggest mt-4">
      <div>
        <img src='https://egs.edu/wp-content/uploads/2019/06/slavoj_zizek_saas-fee.jpg' alt='' />
        Slavoj Žižek
      </div>
      <button ngClass='p-2'>Follow</button>
    </div>

  </div>

</div>
